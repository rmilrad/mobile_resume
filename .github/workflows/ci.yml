name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Forge tests
        working-directory: packages/contracts
        run: forge test -vvv

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests (shared, backend, web)
        run: pnpm test
      - name: Typecheck
        run: pnpm typecheck
      - name: Web build
        run: pnpm build:web
